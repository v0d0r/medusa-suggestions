<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medusa Suggestions</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
        }
        a { color: #8be9fd; text-decoration: none; }
        a:hover { text-decoration: underline; }

        .navbar {
            background: #16213e;
            padding: 0.8rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            border-bottom: 1px solid #0f3460;
        }
        .navbar .brand {
            font-size: 1.2rem;
            font-weight: bold;
            color: #e94560;
            white-space: nowrap;
        }
        .navbar nav {
            display: flex;
            gap: 0.5rem;
            flex: 1;
            align-items: center;
        }
        .navbar nav a {
            padding: 0.4rem 0.7rem;
            border-radius: 4px;
            transition: background 0.2s;
            font-size: 0.85rem;
        }
        .navbar nav a:hover, .navbar nav a.active {
            background: #0f3460;
            text-decoration: none;
        }
        .navbar .admin-link { margin-left: auto; color: #888; font-size: 0.8rem; white-space: nowrap; }

        .hamburger {
            display: none;
            background: none;
            border: none;
            color: #eee;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0.2rem;
            margin-left: auto;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 1.5rem; }

        .search-bar {
            margin-bottom: 2rem;
            display: flex;
            gap: 0.5rem;
        }
        .search-bar input {
            flex: 1;
            padding: 0.7rem 1rem;
            border-radius: 6px;
            border: 1px solid #333;
            background: #16213e;
            color: #eee;
            font-size: 1rem;
        }
        .search-bar button {
            padding: 0.7rem 1.5rem;
            border-radius: 6px;
            border: none;
            background: #e94560;
            color: white;
            cursor: pointer;
            font-size: 1rem;
        }
        .search-bar button:hover { background: #c73e54; }

        .msg {
            padding: 0.8rem 1rem;
            border-radius: 6px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }
        .msg.success { background: #1b4332; color: #95d5b2; }
        .msg.info { background: #1b3a5c; color: #a2d2ff; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(var(--card-min-width, 200px), 1fr));
            gap: var(--grid-gap, 1.5rem);
            align-items: stretch;
        }
        .card {
            background: #16213e;
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
        }
        .card:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(0,0,0,0.3); }
        .card img {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
            background: #0f3460;
        }
        .card .no-poster {
            width: 100%;
            aspect-ratio: 2/3;
            background: #0f3460;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #555;
            font-size: 0.8rem;
        }
        .card-body {
            padding: 0.8rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .card-body h3 {
            font-size: 0.95rem;
            margin-bottom: 0.3rem;
            line-height: 1.3;
        }
        .card-body .meta {
            font-size: 0.75rem;
            color: #888;
            margin-bottom: 0.5rem;
            min-height: 1.8em;
        }
        .card-body .overview {
            font-size: 0.75rem;
            color: #aaa;
            flex: 1;
            overflow-y: auto;
            max-height: 80px;
        }
        .card-actions {
            margin-top: auto;
            padding-top: 0.6rem;
        }
        .btn-suggest {
            width: 100%;
            padding: 0.5rem;
            border: none;
            border-radius: 4px;
            background: #e94560;
            color: white;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 500;
        }
        .btn-suggest:hover { background: #c73e54; }
        .in-medusa {
        .unlikely-available { width: 100%; padding: 0.5rem; border-radius: 4px; background: #3d3d00; color: #d4d400; text-align: center; font-size: 0.8rem; font-weight: 500; }
        .sort-toggle { margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; }
        .sort-toggle span { color: #888; }
        .sort-toggle a { padding: 0.3rem 0.8rem; border-radius: 4px; color: #888; text-decoration: none; }
        .sort-toggle a.active { background: #0f3460; color: #8be9fd; }
        .sort-toggle a:hover { background: #0f3460; text-decoration: none; }
        .on-streaming { width: 100%; padding: 0.5rem; border-radius: 4px; background: #1b3a5c; color: #a2d2ff; text-align: center; font-size: 0.8rem; font-weight: 500; }
            width: 100%;
            padding: 0.5rem;
            border-radius: 4px;
            background: #1b4332;
            color: #95d5b2;
            text-align: center;
            font-size: 0.8rem;
            font-weight: 500;
        }
        .btn-load-more { padding: 0.7rem 2rem; border: 1px solid #444; border-radius: 6px; background: #16213e; color: #8be9fd; cursor: pointer; font-size: 0.9rem; } .btn-load-more:hover { background: #0f3460; } .btn-load-more:disabled { color: #555; cursor: not-allowed; }
        .providers { font-size: 0.7rem; color: #8be9fd; }
        .trailer-btn { color: #ff6b6b; font-size: 0.7rem; text-decoration: none; }
        .trailer-btn:hover { text-decoration: underline; }

        @media (max-width: 600px) {
            .hamburger { display: block; }
            .navbar { flex-wrap: wrap; }
            .navbar nav {
                display: none;
                flex-direction: column;
                width: 100%;
                gap: 0;
                padding-top: 0.5rem;
            }
            .navbar nav.open { display: flex; }
            .navbar nav a {
                padding: 0.6rem 0.8rem;
                width: 100%;
                border-radius: 0;
                border-bottom: 1px solid #0f3460;
            }
            .navbar .admin-link {
                margin-left: 0;
                border-bottom: none;
            }
            .container { padding: 1rem; }
            .grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 1rem; }
        }

        {% block extra_styles %}{% endblock %}
    </style>
</head>
<body>
    <header class="navbar">
        <span class="brand">🐍 Medusa Suggestions</span>
        <button class="hamburger" onclick="document.querySelector('.navbar nav').classList.toggle('open')">☰</button>
        <nav>
            <a href="/" class="{% if tab == 'trending' %}active{% endif %}">Trending</a>
            <a href="/popular" class="{% if tab == 'popular' %}active{% endif %}">Popular</a>
            <a href="/airing" class="{% if tab == 'airing' %}active{% endif %}">Airing Today</a>
            <a href="/upcoming" class="{% if tab == 'upcoming' %}active{% endif %}">Upcoming</a>
            <a href="/search" class="{% if tab == 'search' %}active{% endif %}">Search</a>
            {% if user and user.is_admin %}<a href="/admin" class="admin-link">Admin</a>{% endif %}
            {% if user %}<a href="/preferences" class="admin-link">Preferences</a><a href="/logout" class="admin-link">Logout ({{ user.username }})</a>{% else %}<a href="/login" class="admin-link">Login</a>{% endif %}
        </nav>
    </header>

    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
