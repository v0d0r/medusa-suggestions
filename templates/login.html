<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Medusa Suggestions</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-box {
            background: #16213e;
            padding: 2.5rem;
            border-radius: 12px;
            width: 100%;
            max-width: 360px;
        }
        .login-box h1 {
            font-size: 1.3rem;
            margin-bottom: 0.5rem;
        }
        .login-box p { color: #888; font-size: 0.85rem; margin-bottom: 1.5rem; }
        .login-box input {
            width: 100%;
            padding: 0.7rem 1rem;
            border-radius: 6px;
            border: 1px solid #333;
            background: #1a1a2e;
            color: #eee;
            font-size: 1rem;
            margin-bottom: 1rem;
        }
        .login-box button {
            width: 100%;
            padding: 0.7rem;
            border: none;
            border-radius: 6px;
            background: #e94560;
            color: white;
            font-size: 1rem;
            cursor: pointer;
        }
        .login-box button:hover { background: #c73e54; }
        .error { color: #e94560; font-size: 0.85rem; margin-bottom: 1rem; }
        .back { display: block; text-align: center; margin-top: 1rem; color: #888; font-size: 0.85rem; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>🐍 Login</h1>
        <p>Sign in to personalise your preferences and suggest shows.</p>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form method="post" action="/login">
            <input type="text" name="username" placeholder="Username" autofocus required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <a href="/" class="back">← Continue without login</a>
    </div>
</body>
</html>
